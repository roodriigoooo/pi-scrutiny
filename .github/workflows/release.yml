name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: npm version increment to publish
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
      dist_tag:
        description: npm dist tag
        required: true
        type: choice
        default: latest
        options:
          - latest
          - next
          - beta
          - alpha

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    name: Version, publish, and release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run check

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump package version
        run: |
          npm version "${{ inputs.version }}" -m "chore(release): %s"

      - name: Read package version
        id: package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify bumped package
        run: npm run release:dry

      - name: Push version commit and tag
        run: git push --follow-tags

      - name: Publish to npm
        run: npm publish --access public --provenance --tag "${{ inputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.package.outputs.version }}" \
            --verify-tag \
            --title "v${{ steps.package.outputs.version }}" \
            --generate-notes
